<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Update Information Form</title>
  <link rel="stylesheet" href="apply_form.css">
  <style>
    body {
      padding: 20px;
    }

    .form-container {
      max-width: 1200px;
    }

    .form-section {
      display: flex;
      justify-content: space-between;
    }

    .form-column {
      flex: 0 0 48%;
      background-color: transparent;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 4px #81c4b9;
      backdrop-filter: blur(20px);
    }

    .input-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    textarea {
      resize: vertical;
    }
  </style>
</head>
<body>

  <div class="form-container">
    <h2>Application Form</h2>
    <form id="medicalForm" action="http://localhost:5000/patient/submit-form" method="POST">

      <div class="form-section">

        <!-- Personal Details -->
        <div class="form-column">
          <h3>Personal Details</h3>

          <div class="input-group">
              <input type="text" id="applicationNo" name="applicationNo"  value="<%= applicationNo %>" readonly>
              <label for="applicationNo">Application No:</label>
          </div>

          <div class="input-group">
            <input type="text" id="fullName" name="fullName" required>
            <label for="fullName">Full Name</label>
          </div>
    
          <div class="input-group">
            <input type="date" id="dob" name="dob" required>
            <label for="dob">Date of Birth</label>
          </div>
    
          <div class="input-group">
            <select id="gender" name="gender" required>
              <option value="" disabled selected>Select</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="other">Other</option>
            </select>
            <label for="gender">Gender</label>
          </div>

          <div class="input-group">
            <input type="text" id="relation" name="relation">
            <label for="relation">S/O | D/O</label>
          </div>
    
          <div class="input-group">
            <input type="tel" id="phone" name="phone" required>
            <label for="phone">Phone Number</label>
          </div>
    
          <div class="input-group">
            <input type="tel" id="emergency" name="emergency">
            <label for="emergency">Emergency Contact Number</label>
          </div>
    
          <div class="input-group">
            <textarea id="address" name="address" rows="3"></textarea>
            <label for="address">Address</label>
          </div>
        </div>

        <!-- General Details -->
        <div class="form-column">
          <h3>General Details</h3>

          <div class="input-group">
            <select id="blood-type" name="blood-type">
              <option value="" disabled selected>Select Blood Type</option>
              <option value="A+">A+</option>
              <option value="A-">A-</option>
              <option value="B+">B+</option>
              <option value="B-">B-</option>
              <option value="AB+">AB+</option>
              <option value="AB-">AB-</option>
              <option value="O+">O+</option>
              <option value="O-">O-</option>
            </select>
            <label for="blood-type">Blood Type</label>
          </div>
    
          <div class="input-group">
            <input type="date" id="date-of-service" name="date-of-service" required>
            <label for="date-of-service">Date of Service</label>
          </div>
          
          <div class="input-group">
            <input type="text" id="chief-complaint" name="chief-complaint" required placeholder="">
            <label for="chief-complaint">Chief Complaint</label>
          </div>
    
          <div class="input-group">
            <textarea id="history-of-illness" name="history-of-illness" rows="3" placeholder=""></textarea>
            <label for="history-of-illness">History of Present Illness</label>
          </div>
    
          <div class="input-group">
            <textarea id="past-medication" name="past-medication" rows="2" placeholder=""></textarea>
            <label for="past-medication">Past Medication</label>
          </div>
    
          <div class="input-group">
            <input type="text" id="provider-name" name="provider-name" required placeholder="">
            <label for="provider-name">Present Provider Name</label>
          </div>

        </div>
      </div>

      <!-- Vitals Section -->
      <div class="form-column" style="margin-top: 25px;">
        <h3>Vitals</h3>
              
        <div class="input-group">
            <input type="number" id="height" name="height">
            <label for="height">Height (cm)</label>
          </div>
      
          <div class="input-group">
            <input type="number" id="weight" name="weight">
            <label for="weight">Weight (kg)</label>
          </div>
      
          <div class="input-group">
            <input type="number" step="0.01" id="bmi" name="bmi">
            <label for="bmi">BMI</label>
          </div>
      
          <div class="input-group">
            <input type="number" id="pulse" name="pulse">
            <label for="pulse">Pulse (bpm)</label>
          </div>
      
          <div class="input-group">
            <input type="text" id="bp" name="bp">
            <label for="bp">Blood Pressure (BP)</label>
          </div>
      
          <div class="input-group">
            <input type="number" step="0.1" id="temperature" name="temperature">
            <label for="temperature">Temperature (°C)</label>
          </div>
        
      </div>

      <!-- Submit Button -->
      <div class="button-container">
        <button type="submit">Submit Form</button>
      </div>

    </form>
  </div>

  <script>
    document.getElementById("medicalForm").addEventListener("submit", async function(event) {
      event.preventDefault(); 
  
      const formData = {
        applicationNo: document.getElementById("applicationNo").value,
        fullName: document.getElementById("fullName").value,
        dob: document.getElementById("dob").value,
        gender: document.getElementById("gender").value,
        relation: document.getElementById("relation").value,
        phone: document.getElementById("phone").value,
        emergency: document.getElementById("emergency").value,
        address: document.getElementById("address").value,
        bloodType: document.getElementById("blood-type").value,
        dateOfService: document.getElementById("date-of-service").value,
        chiefComplaint: document.getElementById("chief-complaint").value,
        historyOfIllness: document.getElementById("history-of-illness").value,
        pastMedication: document.getElementById("past-medication").value,
        providerName: document.getElementById("provider-name").value,
        height: document.getElementById("height").value,
        weight: document.getElementById("weight").value,
        bmi: document.getElementById("bmi").value,
        pulse: document.getElementById("pulse").value,
        bp: document.getElementById("bp").value,
        temperature: document.getElementById("temperature").value
      };
  
      try {
        const response = await fetch('http://localhost:5000/patient/submit-form', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(formData)
        });
  
        const result = await response.json();
        alert(result.message); // Show success message from backend

        // Redirect to healthcare_interface.html upon success
        if (response.ok) {
          window.location.href = 'healthcare.html';
        }
      
      } catch (error) {
        console.error("Error submitting the form:", error);
      }
    });


      // Function to generate a unique application number
  function generateUniqueApplicationNo() {
    const uniqueId = 'APP-' + Date.now();
    document.getElementById("applicationNo").value = uniqueId;
  }

  // Call this function when the page loads
  window.onload = generateUniqueApplicationNo;
  </script>
  
  

</body>
