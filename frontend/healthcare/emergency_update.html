<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Update Information Form</title>
  <link rel="stylesheet" href="emergency_update.css">
  <style>
    body {
      padding: 20px;
    }

    .form-container {
      max-width: 1200px;
    }

    .form-section {
      display: flex;
      justify-content: space-between;
    }

    .form-column {
      flex: 0 0 48%;
      background-color: transparent;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 4px #81c4b9;
      backdrop-filter: blur(20px);
    }

    .input-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    textarea {
      resize: vertical;
    }
  </style>
</head>
<body>

  <div style="margin-left: 35px;">
    <div class="form-container">
      <h2>Application Form</h2>
      <form id="updateInformationForm" action='/api/emergency/submit' method="POST">
    
        <div class="form-section">
    
          <!-- Personal Details -->
          <div class="form-column">
            <h3>Personal Details</h3>
    
          
    
            <div class="input-group">
              <input type="text" id="full-name" name="full_name" required>
              <label for="full-name">Full Name</label>
            </div>
    
            <div class="input-group">
              <input type="date" id="dob" name="dob" required>
              <label for="dob">Date of Birth</label>
            </div>
    
            <div class="input-group">
              <select id="gender" name="gender" required>
                <option value="" disabled selected>Select</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
              </select>
              <label for="gender">Gender</label>
            </div>
    
            <div class="input-group">
              <input type="text" id="relation" name="relation" required>
              <label for="relation">S/O | D/O</label>
            </div>
    
            <div class="input-group">
              <input type="tel" id="phone-number" name="phone_number" required>
              <label for="phone-number">Phone Number</label>
            </div>
    
            <div class="input-group">
              <input type="tel" id="emergency-contact" name="emergency_contact" required>
              <label for="emergency-contact">Emergency Contact Number</label>
            </div>
    
            <div class="input-group">
              <textarea id="address" name="address" rows="3" required></textarea>
              <label for="address">Address</label>
            </div>
          </div>
    
          <!-- General Details -->
          <div class="form-column">
            <h3>General Details</h3>
    
            <div class="input-group">
              <select id="blood-type" name="blood_type" required>
                <option value="" disabled selected>Select Blood Type</option>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
              </select>
              <label for="blood-type">Blood Type</label>
            </div>
    
            <div class="input-group">
              <input type="date" id="date-of-service" name="date_of_service" required>
              <label for="date-of-service">Date of Service</label>
            </div>
    
            <div class="input-group">
              <input type="text" id="chief-complaint" name="chief_complaint" required>
              <label for="chief-complaint">Chief Complaint</label>
            </div>
    
            <div class="input-group">
              <textarea id="history-of-illness" name="history_of_illness" rows="3" required></textarea>
              <label for="history-of-illness">History of Present Illness</label>
            </div>
    
            <div class="input-group">
              <textarea id="past-medications" name="past_medications" rows="2" required></textarea>
              <label for="past-medications">Past Medication</label>
            </div>
    
            <div class="input-group">
              <input type="text" id="provider-name" name="provider_name" required>
              <label for="provider-name">Present Provider Name</label>
            </div>
          </div>
        </div>
    
        <div class="form-column" style="margin-top: 25px;">
          <h3>Vitals</h3>
                
          <div class="input-group">
            <input type="number" id="height" name="height" required>
            <label for="height">Height (cm)</label>
          </div>
      
          <div class="input-group">
            <input type="number" id="weight" name="weight" required>
            <label for="weight">Weight (kg)</label>
          </div>
      
          <div class="input-group">
            <input type="number" step="0.01" id="bmi" name="bmi" required>
            <label for="bmi">BMI</label>
          </div>
      
          <div class="input-group">
            <input type="number" id="pulse" name="pulse" required>
            <label for="pulse">Pulse (bpm)</label>
          </div>
      
          <div class="input-group">
            <input type="text" id="blood-pressure" name="blood_pressure" required>
            <label for="blood-pressure">Blood Pressure (BP)</label>
          </div>
      
          <div class="input-group">
            <input type="number" step="0.1" id="temperature" name="temperature" required>
            <label for="temperature">Temperature (°C)</label>
          </div>
        </div>
      </form>
    </div>
  
    <div class="form-container" style="margin-top: 20px;">
      <h2>Update Information Form</h2>
      <form id="updateInformationForm">
    
        <div class="form-section">
    
          <!-- Past Medication Details -->
          <div class="form-column">
            <h3>Past Medication Details</h3>
    
            <div class="input-group">
              <input type="text" id="past-disease" name="past_disease">
              <label for="past-disease">Past Disease (Complaint)</label>
            </div>
    
            <div class="input-group">
              <textarea id="past-medication-details" name="past_medication_details" rows="3"></textarea>
              <label for="past-medication-details">Past Medication</label>
            </div>
    
            <div class="input-group">
              <input type="text" id="past-dosage" name="past_dosage">
              <label for="past-dosage">Dosage</label>
            </div>
    
            <div class="input-group">
              <textarea id="past-reports" name="past_reports" rows="3"></textarea>
              <label for="past-reports">Past Reports</label>
            </div>
          </div>
    
          <!-- Present Medication Details -->
          <div class="form-column">
            <h3>Present Medication Details</h3>
    
            <div class="input-group">
              <input type="text" id="active-problems" name="active_problems">
              <label for="active-problems">Active Problems</label>
            </div>
    
            <div class="input-group">
              <input type="text" id="present-provider" name="present_provider">
              <label for="present-provider">Present Provider</label>
            </div>
    
            <div class="input-group">
              <textarea id="active-medication" name="active_medication" rows="3"></textarea>
              <label for="active-medication">Active Medication</label>
            </div>
    
            <div class="input-group">
              <input type="text" id="present-dosage" name="present_dosage">
              <label for="present-dosage">Dosage</label>
            </div>
    
            <div class="input-group">
              <textarea id="present-reports" name="present_reports" rows="3"></textarea>
              <label for="present-reports">Present Reports</label>
            </div>
          </div>
        </div>
        <!-- Submit Button -->
          <div class="button-container">
            <button type="submit">Submit Form</button>
          </div>
      </form>
    </div>
  </div>

<script>
 document.getElementById('updateInformationForm').addEventListener('submit', async function (e) {
    e.preventDefault(); // Prevent the default form submission behavior

    // Gather form data
    const formData = {
        fullName: document.getElementById('full-name').value,
        dob: document.getElementById('dob').value,
        gender: document.getElementById('gender').value,
        relation: document.getElementById('relation').value,
        phoneNumber: document.getElementById('phone-number').value,
        emergencyContact: document.getElementById('emergency-contact').value,
        address: document.getElementById('address').value,
        bloodType: document.getElementById('blood-type').value,
        chiefComplaint: document.getElementById('chief-complaint').value,
        historyOfPresentIllness: document.getElementById('history-of-illness').value,
        pastMedication: document.getElementById('past-medications').value,
        presentProviderName: document.getElementById('provider-name').value,
        vitals: {
            height: document.getElementById('height').value,
            weight: document.getElementById('weight').value,
            bmi: document.getElementById('bmi').value,
            pulse: document.getElementById('pulse').value,
            bloodPressure: document.getElementById('blood-pressure').value,
            temperature: document.getElementById('temperature').value
        },
        pastMedicalHistory: {
            pastDisease: document.getElementById('past-disease').value,
            pastMedication: document.getElementById('past-medication-details').value,
            pastDosage: document.getElementById('past-dosage').value,
            pastReports: document.getElementById('past-reports').value
        },
        presentMedicalHistory: {
            activeProblems: document.getElementById('active-problems').value,
            presentProvider: document.getElementById('present-provider').value,
            activeMedication: document.getElementById('active-medication').value,
            presentDosage: document.getElementById('present-dosage').value,
            presentReports: document.getElementById('present-reports').value
        }
    };

    try {
        // Send data to the backend using fetch
        const response = await fetch('/api/emergency/submit', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(formData) // Send the form data as JSON
        });

        // Check if the submission was successful
        if (!response.ok) {
            throw new Error('Failed to submit form');
        }

        const result = await response.json(); // Get the response data
        alert('Form submitted successfully!'); // Notify the user
        console.log(result); // Log the result for debugging

    } catch (error) {
        console.error('Error submitting form:', error);
        alert('Error submitting the form. Please try again.');
    }
});

</script>
</body>
</html>
