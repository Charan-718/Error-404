<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navigation without JavaScript</title>
</head>
<body>

  <!-- Button with an id and onclick to navigate to a section -->
  <button id="myButton" onclick="location.href='#section2'">
    Go to Section 2
  </button>

  <!-- Content -->
  <div style="height: 1000px;">
    <h1>Section 1</h1>
    <p>Scroll down or use the button to go to section 2.</p>
  </div>

  <!-- The target section -->
  <div id="section2">
    <h1>Section 2</h1>
    <p>You have reached section 2!</p>
  </div>

</body>
</html>
