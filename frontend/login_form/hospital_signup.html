<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Page</title>
    <link rel="stylesheet" href="hospital_signup.css">
</head>
<body>
    <div class="signup-container">
        <div class="signup-box">
            <h2>Sign Up</h2>
            <form id="signupForm">
               <!-- <div class="input-box">
                    <input type="text" name="hospitalID" required>
                    <label>Hospital ID</label>
                    <span class="focus-border"></span>
                </div> -->
                <div class="input-box">
                    <input type="text" name="employeeID" required>
                    <label>Employee ID</label>
                    <span class="focus-border"></span>
                </div>
                <div class="input-box">
                    <input type="text" name="firstName" required>
                    <label>First Name</label>
                    <span class="focus-border"></span>
                </div>
                <div class="input-box">
                    <input type="text" name="lastName" required>
                    <label>Last Name</label>
                    <span class="focus-border"></span>
                </div>
                <div class="input-box">
                    <input type="email" name="email" required>
                    <label>Email</label>
                    <span class="focus-border"></span>
                </div>
                <div class="input-box">
                    <input type="text" name="phone" required>
                    <label>Phone No</label>
                    <span class="focus-border"></span>
                </div>
                <div class="input-box">
                    <input type="password" name="password" required>
                    <label>Create Password</label>
                    <span class="focus-border"></span>
                </div>
                <div class="input-box">
                    <input type="password" name="confirmPassword" required>
                    <label>Confirm Password</label>
                    <span class="focus-border"></span>
                </div>
                <button type="submit" class="signup-btn">Sign Up</button>
                <p class="signin-text">Already have an account? <a href="log.html">Login here</a></p>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const employeeID = document.querySelector('input[name="employeeID"]').value;
            const firstName = document.querySelector('input[name="firstName"]').value;
            const lastName = document.querySelector('input[name="lastName"]').value;
            const email = document.querySelector('input[name="email"]').value;
            const phone = document.querySelector('input[name="phone"]').value;
            const password = document.querySelector('input[name="password"]').value;
            const confirmPassword = document.querySelector('input[name="confirmPassword"]').value;
    
            const response = await fetch('http://localhost:5000/api/auth/signup', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    employeeID,
                    firstName,
                    lastName,
                    email,
                    phone,
                    password,
                    confirmPassword
                }),
            });
    
            const data = await response.json();
            if (response.ok) {
                alert('Signup successful!');
                window.location.href = 'log.html'; // Redirect to login after success
            } else {
                alert(data.error);
            }
        });
    </script>
</body>
</html>
